name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate. Until this existed, the workflow went straight from install to
      # deploy: any change that merely compiled shipped to production, so a
      # green run meant "deployed", not "correct". These steps run before the
      # build, so a failure stops the deploy instead of publishing the break.
      - name: Lint (accessibility guard)
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run check

      - name: Test
        run: pnpm test

      - name: Build frontend
        run: pnpm run vercel-build
        env:
          BASE_PATH: /dealerships-compliance/
          VITE_APP_URL: https://andrewibrah.github.io/dealerships-compliance
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
